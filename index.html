function getOfflineQueue() { try { var q=safeStorage.getItem("tk-offline-queue"); return q?JSON.parse(q):[]; } catch(e){return[]} }

async function flushOfflineQueue() { var q=getOfflineQueue(); if(q.length===0)return; var sb=getSb(); if(!sb)return; var failed=[]; for(var i=0;i<q.length;i++){var r=await sb.from("tk_punches").upsert(q[i]); if(r.error)failed.push(q[i])} saveOfflineQueue(failed); if(failed.length===0&&q.length>0)console.log("Flushed "+q.length+" offline punches"); }
setInterval(flushOfflineQueue,30000); /* retry every 30 seconds */

async function sbSavePunch(p) {

  var payload={id:p.id,eid:p.eid,type:p.type,time:p.time,dev:p.dev,ip:p.ip,lat:p.lat,lng:p.lng,dist:p.dist,accuracy:p.accuracy||null,altitude:p.altitude||null,speed:p.speed||null,geo_flags:p.flags||null};

}

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371e3;
  var p = Math.PI / 180;
  var dLat = (lat2 - lat1) * p;
  var dLon = (lon2 - lon1) * p;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * p) * Math.cos(lat2 * p) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function checkGeoLocation(gc, lastPunches, eid, forceMobile) {
  return new Promise(function (resolve) {
    if (!gc || (!gc.enforceGeo && !forceMobile)) {
      resolve({
        ok: true,
        dist: 0
      });
      return;
    }
    if (!navigator.geolocation) {
      resolve({
        ok: false,
        reason: "Geolocation not supported by this device. Use the on-site kiosk."
      });
      return;
    }
    /* Layer 1: Get fresh GPS position — zero cache tolerance */
    navigator.geolocation.getCurrentPosition(function (pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var accuracy = pos.coords.accuracy || 9999;
      var altitude = pos.coords.altitude;
      var speed = pos.coords.speed;
      var dist = haversine(lat, lng, gc.siteLat, gc.siteLng);
      var withinRadius = dist <= gc.geoRadius;
      var flags = [];

      /* Layer 2: Accuracy gate — reject low-quality readings */
      var maxAccuracy = gc.geoMaxAccuracy || 150;
      if (accuracy > maxAccuracy) {
        resolve({
          ok: false,
          reason: "GPS signal too weak (accuracy: " + Math.round(accuracy) + "m). Move outdoors or closer to a window and try again.",
          dist: Math.round(dist),
          lat: lat,
          lng: lng,
          accuracy: accuracy
        });
        return;
      }

      /* Layer 3: Velocity/teleportation check — compare to last punch */
      if (lastPunches && eid) {
        var recentPunches = (lastPunches || []).filter(function(p) {
          return p.eid === eid && p.lat && p.lat !== 0;
        }).sort(function(a,b) { return new Date(b.time) - new Date(a.time); });
        if (recentPunches.length > 0) {
          var lastP = recentPunches[0];
          var timeDiffSec = (Date.now() - new Date(lastP.time).getTime()) / 1000;
          if (timeDiffSec > 0 && timeDiffSec < 3600) {
            var distFromLast = haversine(lat, lng, lastP.lat, lastP.lng);

  function genPunches(){
    var punches=[];
    var now=new Date();
    var today=now.toISOString().slice(0,10);
    // Get Monday of this week
    var d=new Date(now);var dow=d.getDay();var moff=dow===0?-6:1-dow;
    d.setDate(d.getDate()+moff);
    var monday=new Date(d);

    DEMO_EMPLOYEES.forEach(function(emp){
      var shH=parseInt(emp.shiftStart.split(":")[0]);
      var shM=parseInt(emp.shiftStart.split(":")[1]);
      var endH=parseInt(emp.shiftEnd.split(":")[0]);
      var endM=parseInt(emp.shiftEnd.split(":")[1]);

      // Generate punches for Mon-today
      for(var day=0;day<7;day++){
        var dd=new Date(monday);dd.setDate(monday.getDate()+day);
        var dateStr=dd.toISOString().slice(0,10);
        if(dateStr>today) continue;
        if(dd.getDay()===0||dd.getDay()===6) continue; // skip weekends

        // Some variance
        var tardyMins=Math.floor(Math.random()*8)-2; // -2 to +5 min
        var earlyMins=Math.floor(Math.random()*10)-3;

        // Special cases for demo violations
        if(emp.id==="D010"&&day===1){continue;} // Maria no-show Tuesday
        if(emp.id==="D003"&&day===0){tardyMins=22;} // Jake tardy Monday
        if(emp.id==="D012"&&day===1){tardyMins=45;} // Jasmine very tardy Tuesday
        if(emp.id==="D005"&&dateStr===today){
          // Carlos clocked in today, not out yet
          var inTime5=new Date(dd);inTime5.setHours(shH,shM+tardyMins,0,0);
          punches.push({id:"p-"+emp.id+"-"+day+"-in",eid:emp.id,type:"in",time:inTime5.toISOString(),dev:"kiosk",ip:"192.168.1.100"});
          continue;
        }
        if(emp.id==="D001"&&dateStr===today){
          // Marcus clocked in today, not out yet
          var inTime1=new Date(dd);inTime1.setHours(shH,shM+1,0,0);
          punches.push({id:"p-"+emp.id+"-"+day+"-in",eid:emp.id,type:"in",time:inTime1.toISOString(),dev:"kiosk",ip:"192.168.1.100"});
          continue;
        }

        // Normal punch pair
        var inTime=new Date(dd);inTime.setHours(shH,shM+tardyMins,0,0);
        var outTime=new Date(dd);outTime.setHours(endH,endM+earlyMins,0,0);

        // Don't create future punches
        if(inTime>now) continue;

        punches.push({id:"p-"+emp.id+"-"+day+"-in",eid:emp.id,type:"in",time:inTime.toISOString(),dev:"kiosk",ip:"192.168.1.100"});
        if(outTime<=now){
          punches.push({id:"p-"+emp.id+"-"+day+"-out",eid:emp.id,type:"out",time:outTime.toISOString(),dev:"kiosk",ip:"192.168.1.100"});
        }
      }
    });
    return punches;
  }

    ];

  ];

  if(!safeStorage.getItem(WT_KEY)){

    overlay.addEventListener("wt-prev",function(){

    +'<div style="font-size:13px;color:'+T3+';margin-bottom:20px">Type a company name and pick a color — the entire app re-skins live.</div>'
    +'<div style="display:flex;gap:12px;margin-bottom:20px;align-items:end">'
    +'<div style="flex:1"><div style="font-size:12px;color:'+T3+';margin-bottom:4px">Company Name</div><input id="brand-name" value="'+companyName+'" style="width:100%;background:'+BG+';border:1px solid '+BD+';color:'+T1+';padding:10px;border-radius:6px;font-size:15px;font-weight:600;outline:none;font-family:'+FF+';box-sizing:border-box"></div>'

    +'<button id="brand-apply" style="padding:10px 24px;background:'+G+';color:#000;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'+FF+';white-space:nowrap">Apply Brand</button>'
    +'<button id="brand-reset" style="padding:10px 16px;background:transparent;border:1px solid '+BD+';color:'+T3+';border-radius:8px;font-size:13px;cursor:pointer;font-family:'+FF+'">Reset</button>'
    +'</div></div>'
    +'<div style="font-size:14px;font-weight:600;color:'+T1+';margin-bottom:12px">Preview</div>'
    +'<div style="background:'+BG+';border:1px solid '+BD+';border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px">'
    +'<div style="font-size:28px;font-weight:800;color:'+brandColor+'" id="brand-preview-name">'+companyName+'</div>'
    +'<div style="font-size:14px;color:'+T3+'">TimeKeep by Spark Companies</div>'
    +'<div style="display:flex;gap:12px">'
    +'<div style="width:120px;height:80px;background:'+brandColor+';border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:13px">Primary</div>'
    +'<div style="width:120px;height:80px;background:'+SRF+';border:2px solid '+brandColor+';border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;color:'+brandColor+';font-size:13px">Accent</div>'
    +'<div style="width:120px;height:80px;background:'+BG+';border:1px solid '+brandColor+';border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;color:'+T1+';font-size:13px">Surface</div>'

    document.getElementById("brand-name").oninput=function(){
      companyName=this.value;
      document.getElementById("brand-preview-name").textContent=companyName;
      document.getElementById("brand-preview-name").style.color=brandColor;

    document.getElementById("brand-color").oninput=function(){
      brandColor=this.value;
      document.getElementById("brand-preview-name").style.color=brandColor;
    };
    document.getElementById("brand-apply").onclick=function(){
      safeStorage.setItem("demo-brand-name",companyName);
      safeStorage.setItem("demo-brand-color",brandColor);
      // Apply brand color to CSS custom property and key elements
      document.documentElement.style.setProperty("--spark-brand",brandColor);
      // Update all elements using C.spark color
      var style=document.createElement("style");
      style.textContent="[data-brand]{color:"+brandColor+" !important}";
      document.head.appendChild(style);
      alert("Brand applied! Close Sales Tools to see '"+companyName+"' branded throughout the app.\n\nNote: Full re-skinning takes effect on next page load.");

      location.reload();

  // ═══════════════════════════════════════
  // ANIMATED AUTO-DEMO
  // ═══════════════════════════════════════
  function renderAutoDemo(el){
    el.innerHTML='<div style="background:'+SRF+';border:1px solid '+BD+';border-radius:12px;padding:24px">'
    +'<div style="font-size:16px;font-weight:700;color:'+T1+';margin-bottom:4px">Animated Kiosk Demo</div>'
    +'<div style="font-size:13px;color:'+T3+';margin-bottom:20px">Close this panel, then watch as the system automatically demonstrates the clock-in flow. Perfect for trade shows or unattended displays.</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">'
    +'<button id="auto-start" style="padding:14px;background:'+G+';color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;font-family:'+FF+'">\u25B6 Start Auto Demo</button>'
    +'<button id="auto-stop" style="padding:14px;background:transparent;border:1px solid '+BD+';color:'+T3+';border-radius:8px;font-size:14px;cursor:pointer;font-family:'+FF+'">\u25A0 Stop</button>'
    +'</div>'
    +'<div style="font-size:13px;color:'+T2+';line-height:1.7">'
    +'<div style="font-weight:600;margin-bottom:8px">The auto demo will:</div>'
    +'<div>1. Show the kiosk home screen for 3 seconds</div>'
    +'<div>2. Auto-tap badge 1001 (Marcus Rivera)</div>'
    +'<div>3. Show the clock-in confirmation</div>'
    +'<div>4. Wait 4 seconds, then auto-tap badge 1004 (Priya Patel)</div>'
    +'<div>5. Show their clock-out confirmation</div>'
    +'<div>6. Loop back to step 1</div>'
    +'<div style="margin-top:12px;color:'+T4+'">Tip: Put the browser in fullscreen (F11) for the best trade show experience.</div>'
    +'</div></div>';

    var autoInterval=null;
    document.getElementById("auto-start").onclick=function(){
      salesPanel.style.display="none";
      // Auto-demo: simulate badge taps
      var sequence=[
        {delay:2000,action:function(){var inp=document.querySelector("input[inputmode=\"numeric\"]");if(inp){inp.value="1001";inp.dispatchEvent(new Event("input",{bubbles:true}))}}},
        {delay:1500,action:function(){var btns=document.querySelectorAll("button");[].forEach.call(btns,function(b){if(b.textContent.includes("CLOCK")||b.textContent.includes("Clock")||b.textContent.includes("GO"))b.click()})}},
        {delay:5000,action:function(){var btns=document.querySelectorAll("button");[].forEach.call(btns,function(b){if(b.textContent.includes("Done")||b.textContent.includes("DONE")||b.textContent.includes("Back")||b.textContent.includes("BACK")||b.textContent==="\u2190")b.click()})}},
        {delay:3000,action:function(){var inp=document.querySelector("input[inputmode=\"numeric\"]");if(inp){inp.value="1004";inp.dispatchEvent(new Event("input",{bubbles:true}))}}},
        {delay:1500,action:function(){var btns=document.querySelectorAll("button");[].forEach.call(btns,function(b){if(b.textContent.includes("CLOCK")||b.textContent.includes("Clock")||b.textContent.includes("GO"))b.click()})}},
        {delay:5000,action:function(){var btns=document.querySelectorAll("button");[].forEach.call(btns,function(b){if(b.textContent.includes("Done")||b.textContent.includes("DONE")||b.textContent.includes("Back")||b.textContent.includes("BACK")||b.textContent==="\u2190")b.click()})}}
      ];
      var step=0;
      function runStep(){
        if(step>=sequence.length){step=0}
        var s=sequence[step];
        autoInterval=setTimeout(function(){
          try{s.action()}catch(e){}
          step++;
          runStep();
        },s.delay);
      }
      runStep();
      safeStorage.setItem("spark-tk-auto-demo","running");
    };
    document.getElementById("auto-stop").onclick=function(){
      if(autoInterval)clearTimeout(autoInterval);
      safeStorage.removeItem("spark-tk-auto-demo");
      alert("Auto demo stopped.");
    };
  }

  // ── INIT ──
  function init(){
    document.body.appendChild(salesBtn);
    document.body.appendChild(salesPanel);
    salesPanel.onclick=function(e){if(e.target===salesPanel)salesPanel.style.display="none"};
    // Move reset button to left side of sales button
    var resetBtn=document.querySelector("button[style*='bottom:16px'][style*='right:16px']");
    if(resetBtn){resetBtn.style.right="auto";resetBtn.style.left="180px"}
  }

  salesPanel.addEventListener("click",function(e){
    if(e.target===salesPanel)salesPanel.style.display="none";
  });

  // Build panel on first open
  var panelBuilt=false;
  var origOpen=salesBtn.onclick;
  salesBtn.onclick=function(){
    salesPanel.style.display="flex";
    salesPanel.style.alignItems="flex-start";
    salesPanel.style.justifyContent="center";
    if(!panelBuilt){buildPanel();panelBuilt=true}
  };

  if(document.body){init()}else{document.addEventListener("DOMContentLoaded",init)}
})();
</script>
